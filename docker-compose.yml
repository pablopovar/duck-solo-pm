name: duck

services:
  web:
    build: .
    restart: unless-stopped
    user: "${DUCK_UID:-1000}:${DUCK_GID:-1000}"

    ports:
      - "${POCKET_PORT:-3200}:3200"

    environment:
      PROJECTS_ROOT: /data/projects
      PROJECTS_HOST_PATH: "${POCKET_PROJECTS_HOST_PATH}"
      POCKET_HOST_APP_ROOT: "${PWD}"

      DUCK_LEAVE_REMINDER_ENABLED: "${DUCK_LEAVE_REMINDER_ENABLED:-true}"
      DUCK_LEAVE_REMINDER_MESSAGE: "${DUCK_LEAVE_REMINDER_MESSAGE:-Did you check?}"

      DUCK_PERIODIC_REMINDER_ENABLED: "${DUCK_PERIODIC_REMINDER_ENABLED:-true}"
      DUCK_PERIODIC_REMINDER_MINUTES: "${DUCK_PERIODIC_REMINDER_MINUTES:-60}"
      DUCK_PERIODIC_REMINDER_MESSAGE: "${DUCK_PERIODIC_REMINDER_MESSAGE:-Time to update the status.}"

      DUCK_MODEL_BASE_URL: "${DUCK_MODEL_BASE_URL:-http://host.docker.internal:11434/v1}"
      DUCK_MODEL_NAME: "${DUCK_MODEL_NAME:-}"
      DUCK_MODEL_API_KEY: "${DUCK_MODEL_API_KEY:-}"
      DUCK_MODEL_TIMEOUT_SECONDS: "${DUCK_MODEL_TIMEOUT_SECONDS:-300}"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - type: bind
        source: "${POCKET_PROJECTS_PATH}"
        target: /data/projects
        read_only: false
