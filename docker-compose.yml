name: door-to-pocket

services:
  web:
    build: .
    restart: unless-stopped

    ports:
      - "3200:3200"

    environment:

      PROJECTS_ROOT: /data/projects
      PROJECTS_HOST_PATH: "${POCKET_PROJECTS_PATH:-../../ai-observer/projects}"
      POCKET_HOST_APP_ROOT: "${PWD}"

    volumes:
      - type: bind
        source: ${POCKET_PROJECTS_PATH:-../../ai-observer/projects}
        target: /data/projects
        read_only: false
